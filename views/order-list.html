<div ng-if="!loading" layout="column" style="width: 100%;">

  <md-table-container style="width: 100%;">

    <table md-table style="width: 100%;">

      <thead md-head>
        <tr md-row>
          <th md-column style="width: 10%;text-align: left;">ID</th>
          <th md-column style="width: 20%;text-align: left;">Status</th>
          <th md-column style="width: 20%;text-align: left;">Total</th>
          <th md-column style="width: 20%;text-align: left;">Actions</th>
        </tr>
      </thead>

      <tbody md-body>

        <!-- Order Row -->
        <tr md-row ng-repeat-start="order in orders">
          <td md-cell>{{ order.id }}</td>
          <td md-cell>{{ order.status }}</td>
          <td md-cell>{{ order.totalAmount | currency:'$' }}</td>
          <td md-cell>
            <md-button class="md-primary md-raised" ng-click="order.show = !order.show">
              {{ order.show ? 'Hide Items' : 'View Items' }}
            </md-button>
          </td>
        </tr>

        <!-- Expanded Items Row -->
        <tr md-row ng-repeat-end ng-if="order.show">
          <td md-cell colspan="4">

            <md-card style="padding: 15px; margin: 10px 0; width: 100%;">
              <h4>Items</h4>

              <md-table-container style="width: 100%;">
                <table md-table style="width: 100%;">

                  <thead md-head>
                    <tr md-row>
                      <th md-column style="text-align: left;">Product ID</th>
                      <th md-column style="text-align: left;">Quantity</th>
                      <th md-column style="text-align: left;">Unit Price</th>
                    </tr>
                  </thead>

                  <tbody md-body>
                    <tr md-row ng-repeat="item in order.items">
                      <td md-cell>{{ item.productId }}</td>
                      <td md-cell>{{ item.quantity }}</td>
                      <td md-cell>{{ item.unitPrice | currency:'$' }}</td>
                    </tr>
                  </tbody>

                </table>
              </md-table-container>

            </md-card>

          </td>
        </tr>

      </tbody>

    </table>

  </md-table-container>

</div>
